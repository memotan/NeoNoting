<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasks">
<title>NeoNoting</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--surface:#1e1e1e;--surface2:#2a2a2a;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;
  --border:#2a2a2a;--red:#e53935;--red2:#c62828;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;overflow:hidden}

#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

.header{
  padding:calc(16px + var(--safe-top)) 16px 8px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0
}
.header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.hicons{display:flex;gap:18px;color:var(--text2);font-size:20px}
.hicons i{cursor:pointer;padding:4px}

.tabs{display:flex;gap:4px;padding:0 16px 10px;flex-shrink:0}
.tab{padding:6px 16px;border-radius:20px;font-size:14px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:inherit;transition:all .15s}
.tab.active{background:var(--text);color:var(--bg);font-weight:500}

.tag-bar{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tag-bar::-webkit-scrollbar{display:none}
.tpill{padding:4px 14px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:inherit;transition:all .15s}
.tpill.active{border-color:var(--red);background:var(--red);color:#fff}
.tpill-add{padding:4px 10px;font-size:15px}

.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

.task-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}

.task-card{
  background:var(--surface);border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  transition:opacity .15s,background .15s;
  user-select:none;touch-action:pan-y
}
.task-card.done{opacity:.4}
.task-card.dragging{opacity:.2}
.task-card.drag-over{background:var(--surface2);outline:1px dashed var(--text4)}

.chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--text4);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.chk.done{background:var(--text4);border-color:var(--text4)}
.chk.done::after{content:'';width:6px;height:10px;border:2px solid var(--text2);border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}

.tbody{flex:1;min-width:0}
.tname{font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.done{text-decoration:line-through;color:var(--text3)}
.ttags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.ttag{font-size:11px;padding:2px 8px;border-radius:10px}

.tacts{display:flex;gap:4px;align-items:center}
.grip{color:var(--text4);font-size:18px;padding:6px 4px;cursor:grab;touch-action:none}
.delbtn{background:none;border:none;color:var(--text4);font-size:16px;cursor:pointer;padding:6px 4px;border-radius:6px;transition:color .15s}
.delbtn:active{color:var(--red)}

.sec-label{padding:16px 16px 6px;font-size:12px;color:var(--text4);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
.clrbtn{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 0}

.input-area{flex-shrink:0;padding:10px 16px;border-top:1px solid var(--border);padding-bottom:calc(10px + var(--safe-bottom));background:var(--bg)}
.tag-sel-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;min-height:0}
.tspill{padding:4px 12px;border-radius:12px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .1s}
.tspill.sel{background:var(--surface2);color:var(--text2);border-color:var(--text4)}

.fab-row{display:flex;gap:10px;align-items:center}
.fab-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.fab-inp:focus{border-color:var(--text4)}
.fab-inp::placeholder{color:var(--text4)}
.fab-btn{width:46px;height:
